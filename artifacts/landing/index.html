          "name": "What is a VPAT and how does AccessibilityAI generate one?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A VPAT (Voluntary Product Accessibility Template) is a document that explains how a software product meets the Revised Section 508 Standards and WCAG 2.1 guidelines. AccessibilityAI automatically scans your website, evaluates each of the 50 WCAG 2.1 Level A/AA success criteria, and generates a complete VPAT 2.5 report in both JSON and PDF format — directly from your Claude Code or Cursor editor."

            "@type": "Answer",

          }

          "@type": "Question",
          "name": "What is EN 301 549 and is it covered?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "EN 301 549 is the European accessibility standard for ICT products and services. AccessibilityAI produces VPAT 2.5 reports that cover EN 301 549 Clause 9 (Web) fully evaluated, and Clauses 5–8 and 10–13 noted as Not Evaluated — the standard enterprise reporting approach."
          }
        }
